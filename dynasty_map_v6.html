<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Dynasty Map</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #0D1B2A; }

/* HEADER */
#hdr {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: #0D1B2A;
  padding: env(safe-area-inset-top, 12px) 12px 10px;
  padding-top: max(env(safe-area-inset-top), 12px);
}
#hdr-row1 { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
#hdr h1 { font-size: 15px; font-weight: 700; color: white; flex: 1; }
#stats { font-size: 11px; color: #7ab; white-space: nowrap; }
#filter-row { display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding-bottom: 2px; }
#filter-row::-webkit-scrollbar { display: none; }
#filter-row input, #filter-row select {
  flex-shrink: 0; height: 32px; padding: 0 10px;
  border-radius: 16px; border: none; font-size: 13px;
  background: #1e3248; color: #dde; outline: none;
  -webkit-appearance: none; appearance: none;
}
#filter-row input { width: 140px; }
#filter-row select { padding-right: 20px; }

/* MAP */
#map-wrap {
  position: fixed; left: 0; right: 0; bottom: 0;
  top: var(--hdr-h, 90px);
  overflow: hidden; background: #c8d4c0; touch-action: none;
}
#tiles { position: absolute; top: 0; left: 0; will-change: transform; }
#tiles img { position: absolute; width: 256px; height: 256px; display: block; }
#pinlayer { position: absolute; top: 0; left: 0; will-change: transform; }
#pinlayer svg.pin { position: absolute; overflow: visible; cursor: pointer; }

/* ZOOM BTNS — bigger for mobile */
#zoom-ctrl {
  position: absolute; right: 12px; bottom: 120px; z-index: 50;
  display: flex; flex-direction: column; gap: 2px;
}
.zbtn {
  width: 44px; height: 44px; background: white; border: none;
  font-size: 22px; font-weight: 300; border-radius: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
  display: flex; align-items: center; justify-content: center;
  color: #333; cursor: pointer; -webkit-user-select: none;
  active: background: #eee;
}

/* LEGEND toggle */
#leg-btn {
  position: absolute; right: 12px; bottom: 66px; z-index: 50;
  width: 44px; height: 44px; background: #0D1B2A; border: none;
  border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.3);
  color: white; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
#legend {
  position: absolute; right: 12px; bottom: 120px; z-index: 60;
  background: rgba(13,27,42,.96); color: #ddd; border-radius: 10px;
  padding: 12px 14px; font-size: 12px; display: none;
  box-shadow: 0 4px 16px rgba(0,0,0,.4);
}
#legend.open { display: block; }
.lr { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; line-height: 1; }
.lr:last-child { margin-bottom: 0; }
.ld { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.lsep { height: 0.5px; background: rgba(255,255,255,.2); margin: 7px 0; }
.lcat { font-size: 10px; color: #aaa; font-weight: 600; margin-bottom: 7px; }

/* BOTTOM SHEET */
#sheet {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 200;
  background: white; border-radius: 20px 20px 0 0;
  box-shadow: 0 -4px 24px rgba(0,0,0,.2);
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(.25,.8,.25,1);
  padding-bottom: env(safe-area-inset-bottom, 0);
  max-height: 60vh; overflow-y: auto;
}
#sheet.open { transform: translateY(0); }
#sheet-handle {
  width: 36px; height: 4px; background: #ddd; border-radius: 2px;
  margin: 10px auto 8px;
}
#sheet-body { padding: 0 18px 20px; }
#sheet-close {
  position: absolute; top: 10px; right: 14px;
  width: 28px; height: 28px; background: #f0f0f0; border: none;
  border-radius: 50%; font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #666;
}
.s-name { font-size: 16px; font-weight: 600; color: #0D1B2A; margin-bottom: 6px; }
.s-addr {
  display: flex; align-items: flex-start; gap: 8px;
  background: #F0F6FF; border-radius: 10px; padding: 10px 12px;
  margin-bottom: 10px; text-decoration: none;
}
.s-addr-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
.s-addr-text { font-size: 13px; color: #185FA5; font-weight: 500; line-height: 1.4; }
.s-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #444; margin-bottom: 6px; }
.s-row-icon { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
.s-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 12px; margin-top: 6px; }
.bc { background:#EAF3DE; color:#27500A; }
.bk { background:#E6F1FB; color:#0C447C; }
.bx { background:#FAEEDA; color:#854F0B; }
.bn { background:#eee; color:#555; }
.bkota { background:#FFF9C4; color:#5D4037; }
</style>
</head>
<body>

<div id="hdr">
  <div id="hdr-row1">
    <h1>Dynasty Map</h1>
    <span id="stats">Loading...</span>
  </div>
  <div id="filter-row">
    <input id="srch" type="search" placeholder="&#128269; Search..." oninput="renderPins()" autocomplete="off" autocorrect="off" spellcheck="false">
    <select id="fSrc" onchange="renderPins()">
      <option value="">All types</option>
      <option value="customer">Customers</option>
      <option value="sba_lead">Kota Leads</option>
    </select>
    <select id="fRep" onchange="renderPins()"><option value="">All reps</option></select>
    <select id="fCity" onchange="renderPins()"><option value="">All cities</option></select>
    <select id="fStat" onchange="renderPins()">
      <option value="">All statuses</option>
      <option value="Closed">Closed</option>
      <option value="Confirmed">Confirmed</option>
      <option value="Canceled">Canceled</option>
      <option value="__none__">No status</option>
    </select>
  </div>
</div>

<div id="map-wrap">
  <div id="tiles"></div>
  <div id="pinlayer"></div>
  <div id="zoom-ctrl">
    <button class="zbtn" ontouchend="zoom(1);return false;" onclick="zoom(1)">+</button>
    <button class="zbtn" ontouchend="zoom(-1);return false;" onclick="zoom(-1)">−</button>
  </div>
  <button id="leg-btn" onclick="document.getElementById('legend').classList.toggle('open')">&#9788;</button>
  <div id="legend">
    <div class="lcat">CUSTOMERS</div>
    <div id="leg-items"></div>
    <div class="lsep"></div>
    <div class="lcat">KOTA LEADS</div>
    <div id="leg-kota"></div>
  </div>
</div>

<!-- Bottom sheet -->
<div id="sheet">
  <div id="sheet-handle"></div>
  <button id="sheet-close" onclick="closeSheet()">&#10005;</button>
  <div id="sheet-body"></div>
</div>

4645.0", "Daytona Beach", "KOTA", "", "", 29.21519, -81.02932, "sba_lead"], ["Lukas Earls", "3052 Esperanza Avenue Daytona Beach, Florida", "4077396050.0", "Daytona Beach", "KOTA", "", "", 29.21813, -81.02226, "sba_lead"], ["Pablo Sanchez", "1719 Cordova Avenue Daytona Beach, Florida", "7862528753.0", "Daytona Beach", "KOTA", "", "", 29.21311, -81.02919, "sba_lead"]];

const REP_COLORS = {
  "Blake Allen":     "#1565C0",
  "Wesley Posey":    "#2E7D32",
  "Kyle Narozny":    "#E65100",
  "Justin Douglass": "#B71C1C",
  "Jaden Chery":     "#7B1FA2",
  "Ethian Oltman":   "#00695C",
  "KOTA":            "#C62828",
  "":                "#757575"
};
const KOTA_COLOR = "#F5C800";

function col(rep, src) { return src==='sba_lead' ? KOTA_COLOR : (REP_COLORS[rep]||'#555'); }
function getLetter(rep, src) { return src==='sba_lead' ? 'K' : (rep||'?')[0].toUpperCase(); }
function textCol(bg) { return bg===KOTA_COLOR ? '#333' : 'white'; }

// Set header height CSS var
function setHdrH() {
  const h = document.getElementById('hdr').offsetHeight;
  document.documentElement.style.setProperty('--hdr-h', h+'px');
}

// Map state
let Z=9, cx=-81.2, cy=28.9;
const TILE=256;
const wrap = document.getElementById('map-wrap');
const tilesEl = document.getElementById('tiles');
const pinEl = document.getElementById('pinlayer');

function lon2x(lon,z){ return ((lon+180)/360)*Math.pow(2,z); }
function lat2y(lat,z){ const s=Math.sin(lat*Math.PI/180); return (0.5-Math.log((1+s)/(1-s))/(4*Math.PI))*Math.pow(2,z); }
function ll2px(lat,lon){
  const W=wrap.offsetWidth, H=wrap.offsetHeight;
  return [W/2+(lon2x(lon,Z)-lon2x(cx,Z))*TILE, H/2+(lat2y(lat,Z)-lat2y(cy,Z))*TILE];
}

function loadTiles(){
  tilesEl.innerHTML='';
  const W=wrap.offsetWidth, H=wrap.offsetHeight;
  const oxf=lon2x(cx,Z), oyf=lat2y(cy,Z);
  const ox=oxf*TILE, oy=oyf*TILE;
  const x0=Math.floor(oxf-W/2/TILE), x1=Math.ceil(oxf+W/2/TILE);
  const y0=Math.floor(oyf-H/2/TILE), y1=Math.ceil(oyf+H/2/TILE);
  const max=Math.pow(2,Z)-1;
  const subs=['a','b','c'];
  for(let tx=x0;tx<=x1;tx++){
    for(let ty=y0;ty<=y1;ty++){
      if(ty<0||ty>max)continue;
      const img=document.createElement('img');
      const ntx=((tx%Math.pow(2,Z))+Math.pow(2,Z))%Math.pow(2,Z);
      img.src=`https://${subs[(ntx+ty)%3]}.tile.openstreetmap.org/${Z}/${ntx}/${ty}.png`;
      img.style.cssText=`position:absolute;left:${tx*TILE-ox+W/2}px;top:${ty*TILE-oy+H/2}px;width:256px;height:256px;`;
      img.onerror=()=>{img.style.display='none';};
      tilesEl.appendChild(img);
    }
  }
}

// Populate filters
const reps=[...new Set(CUSTOMERS.map(c=>c[4]).filter(Boolean))].sort();
const cities=[...new Set(CUSTOMERS.map(c=>c[3]).filter(c=>c&&c.trim()))].sort();
reps.forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=r;document.getElementById('fRep').appendChild(o);});
cities.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;document.getElementById('fCity').appendChild(o);});

// Legend
const legItems = document.getElementById('leg-items');
Object.entries(REP_COLORS).forEach(([n,c])=>{
  if(!n||n==='KOTA')return;
  legItems.innerHTML+=`<div class="lr"><div class="ld" style="background:${c}"></div><span>${n}</span></div>`;
});
document.getElementById('leg-kota').innerHTML=`<div class="lr">
  <svg width="14" height="18" viewBox="0 0 22 30"><path d="M11 0C5 0 0 5 0 11c0 7.5 11 19 11 19s11-11.5 11-19C22 5 17 0 11 0z" fill="${KOTA_COLOR}" stroke="#B8960A" stroke-width="2"/><text x="11" y="13" font-family="Arial" font-size="11" font-weight="bold" fill="#333" text-anchor="middle" dominant-baseline="middle">K</text></svg>
  <span>Kota Leads</span>
</div>`;

function makePinSVG(color, letter) {
  const tc = textCol(color);
  const bc = color===KOTA_COLOR ? '#B8960A' : 'rgba(255,255,255,0.6)';
  return `<path d="M11 0C5 0 0 5 0 11c0 7.5 11 19 11 19s11-11.5 11-19C22 5 17 0 11 0z" fill="${color}" stroke="${bc}" stroke-width="1.5"/>
    <text x="11" y="13" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="${tc}" text-anchor="middle" dominant-baseline="middle">${letter}</text>`;
}

function renderPins(){
  const s=document.getElementById('srch').value.toLowerCase();
  const src=document.getElementById('fSrc').value;
  const r=document.getElementById('fRep').value;
  const c=document.getElementById('fCity').value;
  const st=document.getElementById('fStat').value;
  pinEl.innerHTML='';
  let count=0;
  const W=wrap.offsetWidth, H=wrap.offsetHeight;
  CUSTOMERS.forEach((cu,i)=>{
    const [name,addr,phone,city,rep,setter,status,lat,lng,source]=cu;
    if(lat==null||lng==null)return;
    const ms=!s||name.toLowerCase().includes(s)||(city||'').toLowerCase().includes(s);
    const msrc=!src||source===src;
    const mr=!r||rep===r;
    const mc=!c||(city||'').toLowerCase()===c.toLowerCase();
    const mst=!st||(st==='__none__'?!status:status.includes(st));
    if(!ms||!msrc||!mr||!mc||!mst)return;
    const [px,py]=ll2px(lat,lng);
    if(px<-30||py<-30||px>W+30||py>H+30)return;
    count++;
    const color=col(rep,source);
    const letter=getLetter(rep,source);
    // Use SVG element with large touch target
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','44');
    svg.setAttribute('height','52');
    svg.setAttribute('viewBox','-11 -11 44 52');
    svg.setAttribute('class','pin');
    svg.style.cssText=`position:absolute;left:${px-22}px;top:${py-41}px;`;
    svg.innerHTML=`<rect x="-11" y="-11" width="44" height="52" fill="transparent"/>` + makePinSVG(color,letter);
    svg.addEventListener('click', e=>{ e.stopPropagation(); openSheet(cu); });
    svg.addEventListener('touchend', e=>{ e.preventDefault(); e.stopPropagation(); openSheet(cu); });
    pinEl.appendChild(svg);
  });
  document.getElementById('stats').textContent=`${count} pins`;
}

function openSheet(cu){
  const [name,addr,phone,city,rep,setter,status,,,source]=cu;
  const isKota=source==='sba_lead';
  const sc=status==='Closed'?'bc':status==='Confirmed'?'bk':status.includes('Cancel')?'bx':'bn';
  const sl=status.includes('Cancel')?'Canceled':(status||'No status');
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  const mapsUrl = isIOS
    ? 'https://maps.apple.com/?daddr='+encodeURIComponent(addr)
    : 'https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(addr);
  document.getElementById('sheet-body').innerHTML=`
    <div class="s-name">${name}</div>
    <a class="s-addr" href="${mapsUrl}" target="_blank">
      <span class="s-addr-icon">&#128205;</span>
      <span class="s-addr-text">${addr}<br><span style="font-size:11px;color:#888;font-weight:400;">Tap for directions</span></span>
    </a>
    ${phone?`<div class="s-row"><span class="s-row-icon">&#128222;</span><a href="tel:${phone}" style="color:#185FA5;text-decoration:none;">${phone}</a></div>`:''}
    ${rep?`<div class="s-row"><span class="s-row-icon">&#128100;</span><span>${rep}</span></div>`:''}
    ${setter&&setter!==rep?`<div class="s-row"><span class="s-row-icon">&#128279;</span><span>${setter}</span></div>`:''}
    ${isKota?`<span class="s-badge bkota">Kota Lead</span>`:`<span class="s-badge ${sc}">${sl}</span>`}
  `;
  document.getElementById('sheet').classList.add('open');
  document.getElementById('legend').classList.remove('open');
}

function closeSheet(){
  document.getElementById('sheet').classList.remove('open');
}

// Close sheet on map tap
wrap.addEventListener('click', closeSheet);

// ── TOUCH HANDLING ──────────────────────────────────────────
let touches = {};
let lastDist = null;
let lastMidLat = null, lastMidLng = null;

function getMapLatLng(clientX, clientY) {
  const rect = wrap.getBoundingClientRect();
  const px = clientX - rect.left;
  const py = clientY - rect.top;
  const W=wrap.offsetWidth, H=wrap.offsetHeight;
  const tc=Math.pow(2,Z);
  const lon = cx + (px - W/2)/TILE/tc*360;
  const ytile = lat2y(cy,Z) + (py - H/2)/TILE;
  const lat = Math.atan(Math.sinh(Math.PI*(1-2*ytile/tc)))*180/Math.PI;
  return [lat,lon];
}

wrap.addEventListener('touchstart', e=>{
  Array.from(e.changedTouches).forEach(t=>{ touches[t.identifier]={x:t.clientX,y:t.clientY}; });
  const ids=Object.keys(touches);
  if(ids.length===2){
    const a=touches[ids[0]], b=touches[ids[1]];
    lastDist=Math.hypot(b.x-a.x,b.y-a.y);
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
    [lastMidLat,lastMidLng]=getMapLatLng(mx,my);
  }
},{passive:true});

wrap.addEventListener('touchmove', e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>{ touches[t.identifier]={x:t.clientX,y:t.clientY}; });
  const ids=Object.keys(touches);

  if(ids.length===1){
    // Single finger pan
    const t=e.changedTouches[0];
    const prev=touches[t.identifier];
    // We already updated touches above, need old pos
    // Recalculate delta from previous render
  } else if(ids.length===2){
    // Pinch zoom
    const a=touches[ids[0]], b=touches[ids[1]];
    const dist=Math.hypot(b.x-a.x,b.y-a.y);
    if(lastDist){
      const ratio=dist/lastDist;
      const newZ=Math.max(6,Math.min(17,Z+Math.log2(ratio)));
      Z=newZ;
    }
    lastDist=dist;
    loadTiles(); renderPins();
  }
},{passive:false});

// Better single-finger pan
let panStart=null, panCx=null, panCy=null;
wrap.addEventListener('touchstart', e=>{
  if(e.touches.length===1){
    panStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
    panCx=cx; panCy=cy;
  } else {
    panStart=null;
  }
},{passive:true});

wrap.addEventListener('touchmove', e=>{
  if(e.touches.length===1 && panStart){
    const dx=e.touches[0].clientX-panStart.x;
    const dy=e.touches[0].clientY-panStart.y;
    const tc=Math.pow(2,Z);
    cx=panCx - dx/TILE/tc*360;
    const newYtile=lat2y(panCy,Z) - dy/TILE;
    cy=Math.atan(Math.sinh(Math.PI*(1-2*newYtile/tc)))*180/Math.PI;
    loadTiles(); renderPins();
  }
},{passive:false});

wrap.addEventListener('touchend', e=>{
  Array.from(e.changedTouches).forEach(t=>{ delete touches[t.identifier]; });
  lastDist=null;
  if(e.touches.length===1){
    panStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
    panCx=cx; panCy=cy;
  }
},{passive:true});

// Mouse pan for desktop
let drag=false,dragX=0,dragY=0,dragCx=0,dragCy=0;
wrap.addEventListener('mousedown',e=>{ drag=true; dragX=e.clientX; dragY=e.clientY; dragCx=cx; dragCy=cy; });
document.addEventListener('mouseup',()=>{ drag=false; });
document.addEventListener('mousemove',e=>{
  if(!drag)return;
  const dx=e.clientX-dragX, dy=e.clientY-dragY;
  const tc=Math.pow(2,Z);
  cx=dragCx - dx/TILE/tc*360;
  const ny=lat2y(dragCy,Z)-dy/TILE;
  cy=Math.atan(Math.sinh(Math.PI*(1-2*ny/tc)))*180/Math.PI;
  loadTiles(); renderPins();
});
wrap.addEventListener('wheel',e=>{e.preventDefault();zoom(e.deltaY<0?1:-1);},{passive:false});

function zoom(d){
  Z=Math.max(6,Math.min(17,Z+d));
  loadTiles();renderPins();
}

window.addEventListener('resize',()=>{ setHdrH(); loadTiles(); renderPins(); });
window.addEventListener('orientationchange',()=>{ setTimeout(()=>{ setHdrH(); loadTiles(); renderPins(); },300); });

setHdrH();
loadTiles();
renderPins();
</script>
